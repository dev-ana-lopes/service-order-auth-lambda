name: ci-cd-auth-lambda

on:
  pull_request:
  push:
    branches: [main, homolog]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Check formatting
        run: uv run black --check src tests

      - name: Check imports
        run: uv run isort --check-only src tests

      - name: Lint
        run: uv run flake8 src tests

      - name: Run tests
        run: uv run pytest -q

      - name: Package Lambda artifact
        run: bash scripts/package_lambda.sh

      - name: Validate Lambda artifact
        run: bash scripts/validate_lambda_package.sh

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform -chdir=terraform init -backend=false

      - name: Terraform fmt
        run: terraform -chdir=terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform -chdir=terraform validate

      - name: Terraform plan validation
        run: |
          terraform -chdir=terraform plan -input=false \
            -var="database_url=postgresql://user:pass@example.com:5432/db?sslmode=require" \
            -var="customer_jwt_secret=fake-secret-value-with-32-characters" \
            -var="backend_base_url=https://backend.example.com" \
            -var='private_subnet_ids=["subnet-00000000000000000","subnet-11111111111111111"]' \
            -var='lambda_security_group_ids=["sg-00000000000000000"]' || true

  deploy:
    if: github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Explain AWS Academy Lambda deployment limitation
        run: |
          echo "The Lambda deployment is intentionally not executed in this AWS Academy/Vocareum environment."
          echo "Terraform/CLI creation hit a lab permission limitation, so service-order-auth-cpf was created manually in the AWS Console with LabRole."
          echo "The repository generated build/lambda.zip and the artifact was uploaded to the existing Lambda with AWS CLI."
          echo "The Terraform plan step remains non-blocking because real resources are manual and not imported into remote state."
          echo "The repository keeps implementation, tests, packaging and Terraform validation ready."
          echo "For a regular AWS account, configure a remote Terraform backend, import existing resources if needed, grant the CI role proper permissions and then enable terraform apply."
          echo "Evidence is documented in docs/runbooks/aws-academy-lambda-limitation.md."
