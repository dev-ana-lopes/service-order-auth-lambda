name: ci-cd-auth-lambda

on:
  pull_request:
  push:
    branches: [main, homolog]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked --dev
      - run: uv run black --check src tests
      - run: uv run isort --check-only src tests
      - run: uv run flake8 src tests
      - run: uv run pytest -q
      - run: bash scripts/package_lambda.sh
      - uses: hashicorp/setup-terraform@v3
      - run: terraform -chdir=terraform init -backend=false
      - run: terraform -chdir=terraform fmt -check -recursive
      - run: terraform -chdir=terraform validate
      - run: terraform -chdir=terraform plan -input=false -var="database_url=postgresql://user:pass@example.com:5432/db" -var="customer_jwt_secret=fake-secret-value-with-32-characters" -var="backend_base_url=https://backend.example.com" || true

  deploy:
    if: github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'homolog' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: bash scripts/package_lambda.sh
      - uses: hashicorp/setup-terraform@v3
      - run: terraform -chdir=terraform init
      - run: |
          terraform -chdir=terraform apply -auto-approve \
            -var="database_url=${{ secrets.DATABASE_URL }}" \
            -var="customer_jwt_secret=${{ secrets.CUSTOMER_JWT_SECRET }}" \
            -var="backend_base_url=${{ vars.BACKEND_BASE_URL }}"
