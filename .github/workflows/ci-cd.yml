name: ci-cd-auth-lambda

on:
  pull_request:
  push:
    branches: [main, homolog]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Check formatting
        run: uv run black --check src tests

      - name: Check imports
        run: uv run isort --check-only src tests

      - name: Lint
        run: uv run flake8 src tests

      - name: Run tests
        run: uv run pytest -q

      - name: Package Lambda artifact
        run: bash scripts/package_lambda.sh

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform -chdir=terraform init -backend=false

      - name: Terraform fmt
        run: terraform -chdir=terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform -chdir=terraform validate

      - name: Terraform plan validation
        run: |
          terraform -chdir=terraform plan -input=false \
            -var="database_url=postgresql://user:pass@example.com:5432/db?sslmode=require" \
            -var="customer_jwt_secret=fake-secret-value-with-32-characters" \
            -var="backend_base_url=https://backend.example.com" || true

  deploy:
    if: github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Explain AWS Academy Lambda deployment limitation
        run: |
          echo "The Lambda deployment is intentionally not executed in this AWS Academy/Vocareum environment."
          echo "During validation, lambda:CreateFunction returned implicitDeny for the lab role."
          echo "The repository keeps the Lambda implementation, tests, packaging and Terraform validation ready."
          echo "To deploy this function in a regular AWS account, configure AWS credentials and enable terraform apply."
          echo "Evidence is documented in docs/runbooks/aws-academy-lambda-limitation.md."