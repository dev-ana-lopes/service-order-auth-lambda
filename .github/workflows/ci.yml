name: ci-auth-lambda
on:
  pull_request:
  push:
    branches: [main, homolog]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pytest black flake8 isort python-jose psycopg[binary]
      - run: black --check src tests
      - run: isort --check-only src tests
      - run: flake8 src tests
      - run: pytest -q
      - uses: hashicorp/setup-terraform@v3
      - run: terraform -chdir=terraform init -backend=false
      - run: terraform -chdir=terraform fmt -check
      - run: terraform -chdir=terraform validate
      - run: terraform -chdir=terraform plan -input=false -var="database_url=fake" -var="customer_jwt_secret=fake" -var="backend_base_url=https://backend.example.com" || true
  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'homolog' }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform -chdir=terraform init
      - run: |
          terraform -chdir=terraform apply -auto-approve \
            -var="database_url=${{ secrets.DATABASE_URL }}" \
            -var="customer_jwt_secret=${{ secrets.CUSTOMER_JWT_SECRET }}" \
            -var="backend_base_url=${{ vars.BACKEND_BASE_URL }}"
